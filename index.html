<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kehadiran Santri PPTQ Hidayatullah Ternate</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
    }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Loader Animation */
    .loader {
      border: 3px solid #f3f3f3;
      border-radius: 50%;
      border-top: 3px solid #3b82f6;
      width: 24px;
      height: 24px;
      -webkit-animation: spin 1s linear infinite; /* Safari */
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Hide Content Initially for smooth load */
    #mainContent { display: none; }
  </style>
</head>
<body class="text-slate-800 antialiased pb-24">

  <!-- Header Section -->
  <div class="bg-gradient-to-r from-blue-700 to-indigo-800 pb-16 pt-8 px-6 shadow-lg rounded-b-[2rem]">
    <div class="max-w-3xl mx-auto text-center">
      <div class="inline-flex items-center justify-center p-3 bg-white/20 rounded-2xl backdrop-blur-sm mb-4">
        <i class="ph ph-mosque text-4xl text-white"></i>
      </div>
      <h1 class="text-2xl md:text-3xl font-bold text-white tracking-tight">Presensi Santri</h1>
      <p class="text-blue-100 mt-2 text-sm md:text-base">PPTQ Hidayatullah Ternate</p>
    </div>
  </div>

  <!-- Main Container -->
  <div class="max-w-3xl mx-auto px-4 -mt-8 relative z-10">
    
    <!-- Loading State -->
    <div id="loadingState" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-10 flex flex-col items-center justify-center space-y-4">
      <div class="loader"></div>
      <p class="text-slate-500 font-medium animate-pulse">Memuat data santri dari server...</p>
    </div>

    <!-- Form Wrapper -->
    <form id="absensiForm">
      <div id="mainContent" class="space-y-6">
        
        <!-- Metadata Info Section -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 md:p-6 space-y-5">
          <h2 class="text-lg font-semibold text-slate-800 flex items-center gap-2 border-b border-slate-100 pb-3">
            <i class="ph ph-info text-blue-600"></i> Informasi Presensi
          </h2>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="space-y-2">
              <label for="Ustadz" class="text-sm font-medium text-slate-600 block">Nama Ustadz / Pengisi</label>
              <div class="relative">
                <i class="ph ph-user absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                <input type="text" id="Ustadz" placeholder="Tulis nama Anda" required
                  class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200 text-sm">
              </div>
            </div>

            <div class="space-y-2">
              <label for="jenisAbsensi" class="text-sm font-medium text-slate-600 block">Waktu / Jenis Absensi</label>
              <div class="relative">
                <i class="ph ph-clock absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg z-10"></i>
                <select id="jenisAbsensi" required
                  class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl appearance-none focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200 text-sm">
                  <option value="" disabled selected>Pilih Waktu Sholat...</option>
                  <option value="Subuh">Sholat Subuh</option>
                  <option value="Dhuha">Sholat Dhuha</option>
                  <option value="Dzuhur">Sholat Dzuhur</option>
                  <option value="Ashar">Sholat Ashar</option>
                  <option value="Maghrib">Sholat Maghrib</option>
                  <option value="Isya">Sholat Isya</option>
                </select>
                <i class="ph ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
              </div>
            </div>
          </div>
        </div>

        <!-- Dynamic Classes Container -->
        <div id="kelasContainer" class="space-y-4">
          <!-- Inject kelas here -->
        </div>

      </div>

      <!-- Sticky Submit Button -->
      <div id="submitContainer" class="hidden fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-slate-200 p-4 z-50">
        <div class="max-w-3xl mx-auto">
          <button type="submit" id="btnSubmit" 
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 px-6 rounded-xl shadow-lg shadow-blue-600/30 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
            <i class="ph ph-paper-plane-right text-xl"></i>
            Kirim Data Kehadiran
          </button>
        </div>
      </div>
    </form>

    <!-- Footer -->
    <div class="mt-10 text-center text-xs text-slate-400">
      <p>Created by <span class="font-semibold text-slate-500">Chatimgrafika</span> & <span class="font-semibold text-slate-500">Aks Amir</span></p>
    </div>

  </div>

  <!-- Toast Notification -->
  <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-50 transition-all duration-300 transform -translate-y-24 opacity-0">
    <div class="bg-emerald-500 text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-3 font-medium">
      <i class="ph-fill ph-check-circle text-xl"></i>
      Data Kehadiran Berhasil Dikirim!
    </div>
  </div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzvhPvowptdcw7TetfRy1LGy5yFdkz8GZ1X5wfsI4y5E9bSHHBTQR2rToPIL49xtRVdcQ/exec";

// Toggle Accordion Function
function toggleAccordion(kelas) {
  const content = document.getElementById(`content-${kelas}`);
  const icon = document.getElementById(`icon-${kelas}`);
  
  if (content.classList.contains('hidden')) {
    content.classList.remove('hidden');
    icon.style.transform = 'rotate(180deg)';
  } else {
    content.classList.add('hidden');
    icon.style.transform = 'rotate(0deg)';
  }
}

// Function to build student rows
function buatBlokKelas(kelas, namaSantri) {
  const div = document.createElement('div');
  div.className = 'bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden transition-all duration-200';
  
  // Accordion Header
  const headerHTML = `
    <div class="px-5 py-4 flex items-center justify-between cursor-pointer bg-slate-50 hover:bg-slate-100 transition-colors" onclick="toggleAccordion('${kelas}')">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-blue-100 text-blue-700 flex items-center justify-center font-bold text-sm">
          ${kelas}
        </div>
        <h3 class="font-semibold text-slate-800">Kelas ${kelas} - PUTRA</h3>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-xs font-medium bg-slate-200 text-slate-600 px-2 py-1 rounded-md" id="badge-${kelas}">${namaSantri.length} Santri</span>
        <i class="ph ph-caret-down text-slate-500 transition-transform duration-300" id="icon-${kelas}"></i>
      </div>
    </div>
  `;

  // Student List
  let studentsHTML = `<div class="p-5 space-y-4 hidden border-t border-slate-100" id="content-${kelas}">`;
  
  if(namaSantri.length === 0) {
    studentsHTML += `<div class="text-center text-sm text-slate-400 py-4">Tidak ada data santri</div>`;
  } else {
    namaSantri.forEach((nama, index) => {
      // Safe name for id
      const safeId = `${kelas}_${index}`;
      studentsHTML += `
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 p-3 bg-slate-50/50 rounded-xl border border-slate-100 student-row" data-kelas="${kelas}" data-name="${nama}">
          <span class="font-medium text-slate-700 text-sm sm:text-base">${index + 1}. ${nama}</span>
          
          <div class="grid grid-cols-4 gap-1.5 sm:gap-2">
            <!-- Hadir -->
            <label class="cursor-pointer text-center">
              <input type="radio" name="${safeId}" value="hadir" class="peer sr-only" checked>
              <div class="px-2 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200 bg-white border border-slate-200 text-slate-500 peer-checked:bg-emerald-500 peer-checked:text-white peer-checked:border-emerald-500 peer-checked:shadow-sm">
                Hadir
              </div>
            </label>
            <!-- Pulang -->
            <label class="cursor-pointer text-center">
              <input type="radio" name="${safeId}" value="pulang" class="peer sr-only">
              <div class="px-2 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200 bg-white border border-slate-200 text-slate-500 peer-checked:bg-amber-500 peer-checked:text-white peer-checked:border-amber-500 peer-checked:shadow-sm">
                Pulang
              </div>
            </label>
            <!-- Sakit -->
            <label class="cursor-pointer text-center">
              <input type="radio" name="${safeId}" value="sakit" class="peer sr-only">
              <div class="px-2 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200 bg-white border border-slate-200 text-slate-500 peer-checked:bg-blue-500 peer-checked:text-white peer-checked:border-blue-500 peer-checked:shadow-sm">
                Sakit
              </div>
            </label>
            <!-- Alpa -->
            <label class="cursor-pointer text-center">
              <input type="radio" name="${safeId}" value="alpa" class="peer sr-only">
              <div class="px-2 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200 bg-white border border-slate-200 text-slate-500 peer-checked:bg-rose-500 peer-checked:text-white peer-checked:border-rose-500 peer-checked:shadow-sm">
                Alpa
              </div>
            </label>
          </div>
        </div>
      `;
    });
  }

  studentsHTML += `</div>`;
  div.innerHTML = headerHTML + studentsHTML;
  return div;
}

// Tampilkan Toast Notifikasi
function showToast() {
  const toast = document.getElementById('toast');
  toast.classList.remove('-translate-y-24', 'opacity-0');
  toast.classList.add('translate-y-0', 'opacity-100');
  
  setTimeout(() => {
    toast.classList.remove('translate-y-0', 'opacity-100');
    toast.classList.add('-translate-y-24', 'opacity-0');
  }, 3000);
}

// Fetch Data dari Server
fetch(WEB_APP_URL)
  .then(r => r.json())
  .then(data => {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    document.getElementById('submitContainer').classList.remove('hidden');

    const container = document.getElementById('kelasContainer');
    const listKelas = ['VII','VIII','IX','X','XI','XII'];
    
    // Looping untuk membuat form masing-masing kelas
    listKelas.forEach(k => {
      if(data[k]) {
        container.appendChild(buatBlokKelas(k, data[k]));
      }
    });

    // Buka accordion pertama secara otomatis sebagai petunjuk
    setTimeout(() => toggleAccordion('VII'), 100);

    // Proses Submit Data
    document.getElementById('absensiForm').addEventListener('submit', async e => {
      e.preventDefault();
      
      const btnSubmit = document.getElementById('btnSubmit');
      const originalText = btnSubmit.innerHTML;
      btnSubmit.innerHTML = `<div class="loader w-5 h-5 border-2 border-t-white border-white/30"></div> Mengirim...`;
      btnSubmit.disabled = true;

      const payload = {
        guru: document.getElementById('Ustadz').value,
        jenisAbsensi: document.getElementById('jenisAbsensi').value
      };

      // Kumpulkan data persentasi status radio button
      listKelas.forEach(k => {
        const result = { hadir: [], pulang: [], sakit: [], alpa: [] };
        
        // Ambil baris santri per kelas
        const studentRows = document.querySelectorAll(`.student-row[data-kelas="${k}"]`);
        
        studentRows.forEach(row => {
          const name = row.dataset.name;
          const status = row.querySelector('input[type="radio"]:checked').value;
          result[status].push(name);
        });

        // Masukkan struktur yang dibutuhkan oleh script backend Gsheet
        payload[k] = {
          hadir: result.hadir, jumlahHadir: result.hadir.length,
          pulang: result.pulang, jumlahPulang: result.pulang.length,
          sakit: result.sakit, jumlahSakit: result.sakit.length,
          alpa: result.alpa, jumlahAlpa: result.alpa.length
        };
      });

      try {
        await fetch(WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });

        showToast();
        
        // Reload halaman setelah 2 detik
        setTimeout(() => location.reload(), 2000);
        
      } catch (error) {
        alert("Terjadi kesalahan jaringan saat mengirim data!");
        btnSubmit.innerHTML = originalText;
        btnSubmit.disabled = false;
      }
    });
  })
  .catch(err => {
    document.getElementById('loadingState').innerHTML = `
      <div class="text-rose-500 text-center space-y-2">
        <i class="ph-fill ph-warning-circle text-4xl"></i>
        <p class="font-medium">Gagal memuat data dari server.</p>
        <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-slate-100 rounded-lg text-sm text-slate-700 hover:bg-slate-200">Coba Ulangi</button>
      </div>`;
  });
</script>
</body>
</html>
