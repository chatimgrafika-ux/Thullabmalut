<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badal Umroh Certificate Generator</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons & FontAwesome (Untuk icon Login) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;700&family=Cinzel:wght@400;700&family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap');
    
    :root {
      --primary: #047857; /* Emerald 600 */
      --primary-dark: #064e3b; /* Emerald 900 */
      --primary-bg: #ecfdf5; /* Emerald 50 */
      --accent: #d97706; /* Amber 600 */

      /* Variabel Font Dinamis */
      --font-title: 'Playfair Display', serif;
      --font-body: 'Inter', sans-serif;
      --font-arabic: 'Amiri', serif;
      --font-script: 'Great Vibes', cursive;
    }

    body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
    
    /* Document Fonts Override */
    .cert-title-text { font-family: var(--font-title) !important; }
    .cert-body-text { font-family: var(--font-body) !important; }
    .cert-arabic-text { font-family: var(--font-arabic) !important; }
    .cert-script-text { font-family: var(--font-script) !important; }

    /* Custom Scrollbars */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--primary); }

    /* Certificate Layout (A4 Landscape) */
    .cert-wrapper { perspective: 1000px; }
    
    .certificate-container {
      width: 297mm;
      height: 210mm;
      min-width: 297mm;
      min-height: 210mm;
      margin: 0 auto;
      background: white;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      position: relative;
      box-sizing: border-box;
      transition: all 0.4s ease;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0; /* Pastikan 0 agar ujung ke ujung */
    }

    .cert-inner {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 10;
      padding: 4mm; /* Jarak dari ujung kertas ke bingkai utama */
      display: flex;
      flex-direction: column;
      text-align: center;
      background-size: cover;
      background-position: center;
    }

    /* Print Configuration - FULL BLEED A4 LANDSCAPE */
    @media print {
      @page { 
        size: A4 landscape; 
        margin: 0 !important; 
      }
      
      html, body { 
        width: 297mm !important; 
        height: 210mm !important; 
        margin: 0 !important; 
        padding: 0 !important; 
        background: white !important; 
        -webkit-print-color-adjust: exact !important; 
        print-color-adjust: exact !important; 
      }

      /* Sembunyikan semua UI dan Panel yang tidak perlu dicetak */
      header, #form-panel, #loginModal, #splash-screen, .print\:hidden {
        display: none !important;
      }

      /* Reset wrapper agar tidak mengganggu layout cetak dan menghilangkan warna hitam (slate-800) */
      #main-app, .flex-1, #preview-section, #preview-viewport, #cert-wrapper {
        display: block !important;
        position: static !important;
        width: 100% !important;
        height: auto !important;
        margin: 0 !important;
        padding: 0 !important;
        background: transparent !important;
        transform: none !important;
        overflow: visible !important;
      }

      /* Paksa kontainer sertifikat berada di pojok kiri atas dan pas A4 */
      #cert-container {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 297mm !important;
        height: 210mm !important;
        margin: 0 !important;
        padding: 0 !important;
        box-shadow: none !important;
        transform: none !important;
        page-break-after: avoid !important;
        page-break-inside: avoid !important;
      }

      ::-webkit-scrollbar { display: none !important; }
    }

    /* Islamic Pattern Backgrounds */
    .pattern-overlay {
      position: absolute;
      inset: 0;
      opacity: 0.05;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* Fade Transition */
    .fade-enter { opacity: 0; transform: scale(0.98); }
    .fade-enter-active { opacity: 1; transform: scale(1); transition: opacity 400ms, transform 400ms; }
    
    .thumb-active { border-color: var(--primary) !important; ring: 2px; ring-color: var(--primary); transform: scale(1.05); }

    /* Main app fade in */
    #main-app { opacity: 0; transition: opacity 0.8s ease-in-out; }
    #main-app.loaded { opacity: 1; }
  </style>
</head>
<body class="overflow-hidden h-screen bg-[#0f172a]">

  <!-- ================= MODAL LOGIN (Hidden by default) ================= -->
  <div id="loginModal" class="hidden fixed inset-0 z-[200] bg-black/60 backdrop-blur-sm flex items-center justify-center transition-all duration-300">
    <div id="loginView" class="flex flex-col items-center justify-center p-6 w-full max-w-md mx-auto relative transform scale-95 transition-transform duration-300">
        
        <button onclick="closeLoginModal()" class="absolute top-10 right-4 text-white hover:text-red-400 z-50 p-2">
            <i class="fas fa-times text-xl"></i>
        </button>

        <div class="w-full bg-white/90 backdrop-blur-md rounded-3xl p-8 shadow-2xl border border-white/50 relative overflow-hidden mt-10">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-green-400 to-green-600"></div>
            
            <div class="bg-slate-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner border border-slate-100">
                <img src="https://lh3.googleusercontent.com/d/1LFYbCI1A83jrD4OA9NyuANANMmyZeePL" class="w-16 h-16 object-contain drop-shadow-md" alt="Logo" onerror="this.style.display='none'">
            </div>
            
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-2">Portal Security</h2>
            <p class="text-xs text-center text-gray-500 mb-8 leading-relaxed">Masukkan kode sandi akses untuk menggunakan fitur cetak sertifikat</p>
            
            <div class="space-y-4 mb-8">
                <div class="w-full relative">
                    <label class="text-xs font-semibold text-gray-700 mb-1.5 block">Sandi Akses</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-3.5 text-gray-400"></i>
                        <input type="password" id="password" class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-11 pr-4 py-3.5 text-sm outline-none focus:ring-2 focus:ring-green-500 focus:bg-white transition-all font-medium" placeholder="Masukkan password">
                    </div>
                </div>
            </div>

            <button onclick="handleLogin()" id="btnLogin" class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white font-bold rounded-xl py-4 shadow-lg shadow-green-600/30 hover:shadow-green-600/50 active:scale-[0.98] transition-all text-sm flex items-center justify-center gap-2">
                <span>Verifikasi Sandi</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
        <p class="text-white text-xs mt-8 opacity-80">© 2026 Chatimgrafika. All rights reserved.</p>
    </div>
  </div>

  <!-- ================= SPLASH SCREEN ================= -->
  <div id="splash-screen" class="fixed inset-0 z-[100] bg-[#0f172a] flex flex-col items-center justify-center p-6 text-center transition-all duration-700">
    <div class="w-32 mb-8 relative">
      <!-- Glow Effect -->
      <div class="absolute inset-0 bg-amber-500 blur-2xl opacity-20 rounded-full animate-pulse"></div>
      <img src="https://lh3.googleusercontent.com/d/1LFYbCI1A83jrD4OA9NyuANANMmyZeePL" alt="Logo Chatimgrafika" class="relative z-10 w-full h-full object-contain drop-shadow-[0_0_15px_rgba(217,119,6,0.6)] animate-bounce" style="animation-duration: 2s;" />
    </div>
    <h3 class="text-center flex flex-col items-center">
      <span class="block text-3xl mb-3 font-serif tracking-[0.2em] uppercase text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-500 to-amber-200">Chatimgrafika</span>
      <span class="text-[10px] font-medium text-amber-200/60 uppercase tracking-[0.4em] flex items-center gap-2 bg-amber-900/30 px-4 py-1.5 rounded-full border border-amber-500/20">
        <i data-lucide="loader-2" class="w-3 h-3 animate-spin text-amber-400"></i> Memuat Workspace...
      </span>
    </h3>
  </div>

  <!-- ================= MAIN APP ================= -->
  <div id="main-app" class="h-screen w-full flex flex-col">
    
    <!-- HEADER GLOBAL -->
    <header class="sticky top-0 z-40 bg-white/95 backdrop-blur-sm p-4 border-b border-slate-200 flex justify-between items-center shadow-sm flex-shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 flex items-center justify-center">
          <img src="https://lh3.googleusercontent.com/d/1LFYbCI1A83jrD4OA9NyuANANMmyZeePL" alt="Chatimgrafika" class="w-full h-full object-contain" />
        </div>
        <div>
          <h1 class="text-sm font-black text-slate-800 tracking-tight uppercase">Chatimgrafika</h1>
          <p class="text-[10px] text-emerald-600 font-bold uppercase tracking-widest" data-i18n="appTitle">Badal Umroh Gen</p>
        </div>
      </div>
      <div class="flex gap-2">
        <!-- Language Switcher -->
        <button onclick="toggleLanguage()" class="flex items-center gap-1 p-2 text-slate-500 hover:text-emerald-600 bg-slate-100 hover:bg-emerald-50 border border-slate-200 rounded-lg transition-colors font-bold text-xs" title="Ganti Bahasa">
          <i class="fas fa-language"></i> <span id="lang-text">ID</span>
        </button>

        <!-- Toggle Preview Button -->
        <button onclick="togglePreview()" class="p-2 text-slate-400 hover:text-emerald-500 hover:bg-emerald-50 rounded-lg transition-colors" title="Sembunyikan/Tampilkan Preview">
          <i data-lucide="eye-off" id="toggle-preview-icon" class="w-5 h-5"></i>
        </button>
        <button onclick="resetData()" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors hidden sm:block" title="Reset Form">
          <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
        </button>
        <button onclick="attemptPrint()" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-lg text-xs font-bold transition-colors shadow-md">
          <i data-lucide="printer" class="w-4 h-4"></i> <span class="hidden sm:inline" data-i18n="btnCetak">CETAK PDF</span>
        </button>
      </div>
    </header>

    <!-- CONTENT SPLIT -->
    <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
      
      <!-- LEFT: CONTROL PANEL (FORM) -->
      <div id="form-panel" class="w-full md:w-[450px] lg:w-[500px] flex-1 md:h-full flex flex-col bg-white md:border-r border-slate-200 shadow-2xl z-20 flex-shrink-0 order-2 md:order-1 overflow-y-auto">
        <!-- FORM AREA -->
        <div class="p-5 space-y-6 custom-scrollbar pb-24" id="form-container">
          
          <!-- Template Selector -->
          <section>
            <h2 class="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-3 flex items-center gap-2">
              <i data-lucide="layout" class="w-3 h-3 text-emerald-600"></i> <span data-i18n="secDesign">Desain Sertifikat (20 Tema)</span>
            </h2>
            <div class="grid grid-cols-4 md:grid-cols-5 gap-2" id="template-selector">
              <!-- Thumbnails generated by JS -->
            </div>
          </section>

          <!-- Global Attributes -->
          <section class="bg-slate-50 p-4 rounded-2xl border border-slate-200">
            <h2 class="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-3" data-i18n="secAttr">Atribut Dokumen</h2>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-[10px] font-semibold text-slate-400 mb-1" data-i18n="lblNomor">Nomor Sertifikat</label>
                <input type="text" id="b_nomor" class="input-field w-full p-2.5 bg-white border border-slate-200 rounded-lg text-xs focus:border-emerald-500 focus:ring-2 focus:ring-emerald-50 outline-none shadow-sm transition-all font-mono" oninput="handleInputFilter(this)" />
              </div>
              <div>
                <label class="block text-[10px] font-semibold text-slate-400 mb-1" data-i18n="lblTanggal">Tanggal Terbit</label>
                <input type="date" id="b_tanggal" class="input-field w-full p-2.5 bg-white border border-slate-200 rounded-lg text-xs focus:border-emerald-500 focus:ring-2 focus:ring-emerald-50 outline-none shadow-sm transition-all text-slate-600" onchange="queueAutoSave()" oninput="queueAutoSave()" />
              </div>
              <div>
                <label class="block text-[10px] font-semibold text-slate-400 mb-1" data-i18n="lblLokasi">Lokasi Pembuatan</label>
                <input type="text" id="b_lokasi" value="Makkah Al-Mukarramah" class="input-field w-full p-2.5 bg-white border border-slate-200 rounded-lg text-xs focus:border-emerald-500 focus:ring-2 focus:ring-emerald-50 outline-none shadow-sm transition-all" oninput="handleInputFilter(this)" />
              </div>
              <div>
                <label class="block text-[10px] font-semibold text-slate-400 mb-1" data-i18n="lblJenis">Jenis Badal</label>
                <select id="b_jenis" class="input-field w-full p-2.5 bg-white border border-slate-200 rounded-lg text-xs focus:border-emerald-500 focus:ring-2 focus:ring-emerald-50 outline-none shadow-sm transition-all" onchange="queueAutoSave()">
                  <option value="Badal Umroh" data-i18n="valUmroh">Badal Umroh</option>
                  <option value="Badal Haji & Umroh" data-i18n="valHajiUmroh">Badal Haji & Umroh</option>
                  <option value="Badal Haji" data-i18n="valHaji">Badal Haji</option>
                </select>
              </div>
              <div class="col-span-2">
                <label class="block text-[10px] font-semibold text-slate-400 mb-1" data-i18n="lblFont">Kombinasi Font</label>
                <select id="b_font" class="input-field w-full p-2.5 bg-white border border-slate-200 rounded-lg text-xs focus:border-emerald-500 focus:ring-2 focus:ring-emerald-50 outline-none shadow-sm transition-all" onchange="changeFontCombo()">
                  <option value="0" data-i18n="fontCombo0">Klasik Formal</option>
                  <option value="1" data-i18n="fontCombo1">Mewah & Elegan</option>
                  <option value="2" data-i18n="fontCombo2">Tradisional</option>
                </select>
              </div>
            </div>
          </section>

          <!-- Data Peserta & Pelaksana -->
          <section>
            <h2 class="text-[11px] font-black text-emerald-700 uppercase tracking-widest mb-4 pb-2 border-b-2 border-emerald-50" data-i18n="secPelaksanaan">Data Pelaksanaan</h2>
            <div class="space-y-4">
              <div>
                <label class="block text-[11px] font-semibold text-slate-600 mb-1.5" data-i18n="lblPeserta">Nama Peserta Badal (Yang Dibadalkan)</label>
                <input type="text" id="b_peserta" data-i18n-ph="phPeserta" placeholder="Contoh: Alm. H. Ahmad bin Abdullah" class="input-field w-full p-3 bg-white border border-slate-200 rounded-xl text-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-50 outline-none shadow-sm transition-all" oninput="handleInputFilter(this)" />
              </div>
              <div>
                <label class="block text-[11px] font-semibold text-slate-600 mb-1.5" data-i18n="lblPelaksana">Nama Pelaksana (Mutawwif / Badal)</label>
                <input type="text" id="b_pelaksana" data-i18n-ph="phPelaksana" placeholder="Contoh: Ustadz Fulan Al-Banjary" class="input-field w-full p-3 bg-white border border-slate-200 rounded-xl text-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-50 outline-none shadow-sm transition-all" oninput="handleInputFilter(this)" />
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-[11px] font-semibold text-slate-600 mb-1.5" data-i18n="lblMiqot">Miqot</label>
                  <select id="b_miqot" class="input-field w-full p-3 bg-white border border-slate-200 rounded-xl text-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-50 outline-none shadow-sm transition-all" onchange="queueAutoSave()">
                    <option value="Bir Ali (Zulhulaifah)">Bir Ali (Zulhulaifah)</option>
                    <option value="Qarnul Manazil (As-Sail)">Qarnul Manazil (As-Sail)</option>
                    <option value="Yalamlam">Yalamlam</option>
                    <option value="Juhfah">Juhfah</option>
                    <option value="Zatu Irqin">Zatu Irqin</option>
                    <option value="Tan'im (Masjid Aisyah)">Tan'im (Masjid Aisyah)</option>
                    <option value="Ji'ranah">Ji'ranah</option>
                  </select>
                </div>
                <div>
                  <label class="block text-[11px] font-semibold text-slate-600 mb-1.5" data-i18n="lblWaktu">Waktu Pelaksanaan</label>
                  <input type="text" id="b_waktu" data-i18n-ph="phWaktu" placeholder="Contoh: Ba'da Subuh" class="input-field w-full p-3 bg-white border border-slate-200 rounded-xl text-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-50 outline-none shadow-sm transition-all" oninput="handleInputFilter(this)" />
                </div>
              </div>
              <div>
                <label class="block text-[11px] font-semibold text-slate-600 mb-1.5" data-i18n="lblLink">Link Dokumentasi (Auto Generate QR)</label>
                <input type="url" id="b_link" data-i18n-ph="phLink" placeholder="Contoh: https://youtube.com/..." class="input-field w-full p-3 bg-white border border-slate-200 rounded-xl text-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-50 outline-none shadow-sm transition-all" oninput="handleInputFilter(this)" />
              </div>
            </div>
          </section>

          <!-- Instansi & Tanda Tangan -->
          <section class="bg-slate-50 p-4 rounded-2xl border border-slate-200">
            <h2 class="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-3 flex items-center justify-between">
              <span data-i18n="secLembaga">Lembaga / Travel</span>
              <div class="flex gap-2">
                <label class="cursor-pointer bg-white border border-slate-200 hover:border-emerald-500 text-slate-500 hover:text-emerald-600 px-2 py-1 rounded text-[9px] flex items-center gap-1 transition-colors">
                  <i data-lucide="image" class="w-3 h-3"></i> Logo
                  <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event, 'logo')">
                </label>
                <label class="cursor-pointer bg-white border border-slate-200 hover:border-emerald-500 text-slate-500 hover:text-emerald-600 px-2 py-1 rounded text-[9px] flex items-center gap-1 transition-colors">
                  <i data-lucide="pen-tool" class="w-3 h-3"></i> TTD
                  <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event, 'ttd')">
                </label>
              </div>
            </h2>
            <div class="space-y-3">
              <input type="text" id="b_travel" data-i18n-ph="phTravel" placeholder="Nama Travel / Lembaga (Contoh: PT. Barokah Tour)" class="input-field w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm focus:border-emerald-500 outline-none shadow-sm font-bold" oninput="handleInputFilter(this)" />
              <input type="text" id="b_jabatan" data-i18n-ph="phJabatan" placeholder="Jabatan Penandatangan (Contoh: Direktur Utama)" value="Direktur Utama" class="input-field w-full p-2.5 bg-white border border-slate-200 rounded-lg text-xs focus:border-emerald-500 outline-none shadow-sm" oninput="handleInputFilter(this)" />
              <input type="text" id="b_penandatangan" data-i18n-ph="phPenandatangan" placeholder="Nama Penandatangan" class="input-field w-full p-2.5 bg-white border border-slate-200 rounded-lg text-xs focus:border-emerald-500 outline-none shadow-sm" oninput="handleInputFilter(this)" />
            </div>
            
            <!-- Previews for Uploads -->
            <div class="flex gap-2 mt-3">
              <div id="prev-logo-container" class="hidden w-12 h-12 bg-white border rounded relative flex items-center justify-center p-1 group">
                <img id="prev-logo" src="" class="max-w-full max-h-full object-contain" />
                <button onclick="removeImage('logo')" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-0.5 hidden group-hover:block"><i data-lucide="x" class="w-3 h-3"></i></button>
              </div>
              <div id="prev-ttd-container" class="hidden w-16 h-12 bg-white border rounded relative flex items-center justify-center p-1 group">
                <img id="prev-ttd" src="" class="max-w-full max-h-full object-contain" />
                <button onclick="removeImage('ttd')" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-0.5 hidden group-hover:block"><i data-lucide="x" class="w-3 h-3"></i></button>
              </div>
            </div>
          </section>

        </div>
      </div>

      <!-- RIGHT: PREVIEW PANEL -->
      <div class="w-full h-[45vh] md:h-full md:flex-1 bg-slate-800 relative order-1 md:order-2 border-b md:border-b-0 border-slate-700 flex flex-col transition-all duration-300 ease-in-out" id="preview-section">
        
        <!-- Zoom control fixed at bottom center of the preview wrapper -->
        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-30 flex gap-2 print:hidden bg-slate-900/90 p-2 rounded-2xl backdrop-blur-md border border-slate-700 shadow-2xl">
          <button onclick="adjustScale(-0.05)" class="text-white hover:text-emerald-400 p-2" title="Perkecil"><i data-lucide="zoom-out" class="w-5 h-5"></i></button>

    function init() {
      // Splash screen & Main App logic
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        const mainApp = document.getElementById('main-app');
        if(splash) {
          splash.style.opacity = '0';
          setTimeout(() => {
            splash.classList.add('hidden');
            mainApp.classList.add('loaded'); // Fade in the main app
            calculateAutoScale(); // Ensure right scale after load
          }, 700);
        }
      }, 1800);

      renderThemeSelector();
      changeFontCombo(); // Memastikan inisialisasi font default
      
      const dateInput = document.getElementById('b_tanggal');
      const numInput = document.getElementById('b_nomor');
      const today = new Date();
      
      if (!dateInput.value) {
        // Set to YYYY-MM-DD for date input
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        dateInput.value = `${yyyy}-${mm}-${dd}`;
      }
      
      if (!numInput.value) {
        const yyyymmdd = today.toISOString().slice(0,10).replace(/-/g, "");
        const rnd = Math.floor(Math.random() * 900) + 100;
        numInput.value = `BU-${yyyymmdd}-${rnd}`;
      }

      applyTranslations(); // Set UI language
      loadSavedData();
      calculateAutoScale(); 
      renderPreview();
    }

    // --- Logic Mengubah Font Combo ---
    function changeFontCombo() {
      const idx = document.getElementById('b_font').value || 0;
      const combo = fontCombos[idx];
      document.documentElement.style.setProperty('--font-title', combo.title);
      document.documentElement.style.setProperty('--font-body', combo.body);
      document.documentElement.style.setProperty('--font-arabic', combo.arabic);
      document.documentElement.style.setProperty('--font-script', combo.script);
      queueAutoSave();
    }

    // --- Logic Ganti Bahasa & Filter Input ---
    function toggleLanguage() {
      currentLanguage = currentLanguage === 'id' ? 'ar' : 'id';
      document.getElementById('lang-text').innerText = currentLanguage.toUpperCase();
      applyTranslations();
      queueAutoSave();
    }

    function applyTranslations() {
      const t = translations[currentLanguage];
      
      // Update semua text element
      document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.getAttribute('data-i18n');
          if (t[key]) {
            if (el.tagName === 'OPTION') {
              el.text = t[key];
            } else {
              el.innerHTML = t[key];
            }
          }
      });
      
      // Update semua placeholder
      document.querySelectorAll('[data-i18n-ph]').forEach(el => {
          const key = el.getAttribute('data-i18n-ph');
          if (t[key]) el.placeholder = t[key];
      });

      // Update options dropdown miqot
      const miqotSelect = document.getElementById('b_miqot');
      if(currentLanguage === 'ar') {
          miqotSelect.options[0].text = "ذي الحليفة (أبيار علي)";
          miqotSelect.options[1].text = "قرن المنازل (السيل الكبير)";
          miqotSelect.options[2].text = "يلملم";
          miqotSelect.options[3].text = "الجحفة";

          miqotSelect.options[5].text = "التنعيم (مسجد عائشة)";
          miqotSelect.options[6].text = "الجعرانة";
      } else {
          miqotSelect.options[0].text = "Bir Ali (Zulhulaifah)";

      }

    // Memblokir input Latin saat mode Arab aktif
    function handleInputFilter(el) {
        if (currentLanguage === 'ar') {
            // Abaikan input tipe link, nomor sertifikat, dan tanggal
            if (el.id !== 'b_link' && el.id !== 'b_nomor' && el.id !== 'b_tanggal' && el.id !== 'b_font') {
                const cursorPos = el.selectionStart;
                // Menghapus semua karakter huruf latin (A-Z, a-z)
                el.value = el.value.replace(/[a-zA-Z]/g, '');
                el.setSelectionRange(cursorPos, cursorPos);
            }
        }
        queueAutoSave();
    }

    document.addEventListener('keydown', function(event) {

    });

    async function hashPassword(message) {
        const msgBuffer = new TextEncoder().encode(message);                    
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        return hashHex;
    }

        const modal = document.getElementById('loginModal');
        const view = document.getElementById('loginView');
        view.classList.remove('scale-100'); view.classList.add('scale-95');
        setTimeout(() => { modal.classList.add('hidden'); }, 300);
    }

    function executePrint() {
        const originalTitle = document.title;
        const pesertaName = document.getElementById('b_peserta').value.trim() || 'Peserta';
        document.title = `Badal Umroh - ${pesertaName}`;
        window.print();
        setTimeout(() => { document.title = originalTitle; }, 1000);
    }

    function attemptPrint() {
        const isAuth = sessionStorage.getItem('is_auth_print') === 'true';
        if (isAuth) {
            executePrint();
        } else {
            showLoginModal();
        }
    }

    async function handleLogin() {
        const pwdInput = document.getElementById('password').value;
        if (!pwdInput) return alert("Silakan masukkan sandi akses!");

        const btn = document.getElementById('btnLogin');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Memverifikasi...</span>';
        btn.disabled = true;

        try {
            const hashedPwd = await hashPassword(pwdInput);
            
            let apiUrl = null;
            if (API_ENCODED !== 'YOUR_BASE64_ENCODED_API_URL_HERE') {
                if (API_ENCODED.startsWith('http')) {
                    apiUrl = API_ENCODED;
                } else {
                    try {
                        let base64Str = API_ENCODED;
                        while (base64Str.length % 4 !== 0) { base64Str += '='; }
                        apiUrl = atob(base64Str);
                    } catch (e) {
                        console.warn("Peringatan: URL API gagal di-decode, menggunakan URL secara langsung.");
                        apiUrl = API_ENCODED;
                    }
                }
            }
            
            if(!apiUrl || !apiUrl.startsWith('http')) {
                alert("API Endpoint belum disetting dengan benar di source code.");
                throw new Error("Missing or Invalid API URL");
            }

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ hash: hashedPwd })
            });

            const result = await response.json();

            if (result.status === 'success') {
                sessionStorage.setItem('is_auth_print', 'true');
                closeLoginModal();
                setTimeout(() => { executePrint(); }, 400);
            } else {
                alert("Sandi akses yang Anda masukkan SALAH!");
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }

        } catch (error) {
            console.error("Gagal verifikasi login:", error);
            alert("Terjadi kesalahan sistem/jaringan saat memverifikasi sandi. Silakan periksa koneksi Anda.");
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    document.getElementById('password').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') handleLogin();
    });

    // --- Helper Format Date (Masehi & Hijriah) ---
    function formatHijriMasehi(dateStr, location, isAr) {
      if(!dateStr) return '';
      try {
        const d = new Date(dateStr);
        if (isNaN(d)) return `${location}${isAr ? '، ' : ', '}${dateStr}`;

        const localeM = isAr ? 'ar-SA-u-nu-arab' : 'id-ID';
        const optionsM = { day: 'numeric', month: 'long', year: 'numeric' };
        let masehi = d.toLocaleDateString(localeM, optionsM);
        masehi += isAr ? ' م' : ' M';
        
        let hijriah = '';
        try {
          const localeH = isAr ? 'ar-SA-u-ca-islamic-umalqura-nu-arab' : 'id-ID-u-ca-islamic-umalqura';
          const optionsH = { day: 'numeric', month: 'long', year: 'numeric', calendar: 'islamic-umalqura' };
          let hStr = new Intl.DateTimeFormat(localeH, optionsH).format(d);
          
          // Memotong marker penanggalan yang salah (seperti M, H, AH, SM, EH) di bagian akhir
          let cleanHStr = hStr.replace(/\s*(هـ|م|AH|SM|EH|H|M|CE|BCE)\s*$/i, '');
          hijriah = cleanHStr.trim() + (isAr ? ' هـ' : ' H');
        } catch(e) {
          hijriah = '';
        }

        const separator = isAr ? '، الموافق ' : ', bertepatan dengan ';
        const comma = isAr ? '، ' : ', ';
        return hijriah ? `${location}${comma}${masehi}${separator}${hijriah}` : `${location}${comma}${masehi}`;
      } catch(e) {
        return `${location}${isAr ? '، ' : ', '}${dateStr}`;
      }
    }

    // --- Theme Selector Rendering ---
    function renderThemeSelector() {
      const container = document.getElementById('template-selector');
      container.innerHTML = '';
      templates.forEach((theme, idx) => {
        const btn = document.createElement('button');
        btn.className = `w-full aspect-video rounded-md border-2 border-transparent hover:scale-105 transition-transform shadow-sm overflow-hidden ${idx === currentTemplate ? 'thumb-active' : ''}`;
        btn.style.background = theme.thumb;
        btn.title = theme.name;
        btn.onclick = () => {
          currentTemplate = idx;
          renderThemeSelector(); 
          queueAutoSave();
        };
        container.appendChild(btn);
      });
    }

    // --- Image Handlers ---
    function handleImageUpload(e, type) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const base64 = event.target.result;
          if (type === 'logo') { imgLogo = base64; }
          if (type === 'ttd') { imgTtd = base64; }
          
          try {
            localStorage.setItem(`bu_${type}`, base64);
          } catch(err) { console.warn("Image too large for local storage"); }
          
          updateImageUI();
          queueAutoSave();
        };
        reader.readAsDataURL(file);
      }
    }

    function removeImage(type) {
      if (type === 'logo') { imgLogo = null; localStorage.removeItem('bu_logo'); }
      if (type === 'ttd') { imgTtd = null; localStorage.removeItem('bu_ttd'); }
      updateImageUI();
      queueAutoSave();
    }

    function updateImageUI() {
      const logoCont = document.getElementById('prev-logo-container');
      const logoImg = document.getElementById('prev-logo');
      if (imgLogo) { logoImg.src = imgLogo; logoCont.classList.remove('hidden'); } 
      else { logoCont.classList.add('hidden'); }

      const ttdCont = document.getElementById('prev-ttd-container');
      const ttdImg = document.getElementById('prev-ttd');
      if (imgTtd) { ttdImg.src = imgTtd; ttdCont.classList.remove('hidden'); } 
      else { ttdCont.classList.add('hidden'); }
    }

    // --- Auto Save & Load ---
    function queueAutoSave() {
      clearTimeout(autoSaveTimeout);
      renderPreview();
      autoSaveTimeout = setTimeout(saveData, 500);
    }

    function saveData() {
      const inputs = document.querySelectorAll('.input-field');
      const data = { template: currentTemplate, fields: {} };
      inputs.forEach(input => { data.fields[input.id] = input.value; });
      localStorage.setItem('bu_data', JSON.stringify(data));
    }

    function loadSavedData() {
      imgLogo = localStorage.getItem('bu_logo');
      imgTtd = localStorage.getItem('bu_ttd');
      updateImageUI();

      const savedData = localStorage.getItem('bu_data');
      if (savedData) {
        try {
          const data = JSON.parse(savedData);
          if (data.template !== undefined) { currentTemplate = data.template; renderThemeSelector(); }
          if (data.fields) {
            Object.keys(data.fields).forEach(id => {
              const el = document.getElementById(id);
              if (el) {
                el.value = data.fields[id];
                if (id === 'b_font') changeFontCombo(); // Set font jika ada tersimpan
              }
            });
          }
        } catch(e) { console.error("Error loading data", e); }
      }
    }

    function resetData() {
      if(confirm("Hapus semua data form?")) {
        localStorage.removeItem('bu_data');
        localStorage.removeItem('bu_logo');
        localStorage.removeItem('bu_ttd');
        imgLogo = null; imgTtd = null;
        document.querySelectorAll('.input-field').forEach(el => el.value = '');
        updateImageUI();
        init();
      }
    }

    // --- View Controls (Auto Scale to Fit Screen) ---
    function adjustScale(change) {
      previewScale += change;
      if (previewScale < 0.15) previewScale = 0.15;
      if (previewScale > 2.0) previewScale = 2.0;
      
      const container = document.getElementById('cert-container');
      const wrapper = document.getElementById('cert-wrapper');
      
      if (window.matchMedia('print').matches) {
        container.style.transform = `none`;
        wrapper.style.height = 'auto';
      } else {
        container.style.transform = `scale(${previewScale})`;
        wrapper.style.height = `${794 * previewScale}px`; 
      }
    }

    function calculateAutoScale() {
      const viewport = document.getElementById('preview-viewport');
      if (!viewport || !isPreviewVisible) return;
      
      const certBaseWidth = 1123; // Estimasi lebar 297mm dalam pixels
      const paddingX = window.innerWidth < 768 ? 32 : 80; 
      
      let autoScale = (viewport.clientWidth - paddingX) / certBaseWidth;
      
      if (autoScale > 1.5) autoScale = 1.5;
      if (autoScale < 0.15) autoScale = 0.15;
      
      previewScale = autoScale;
      adjustScale(0);
    }

    window.addEventListener('resize', calculateAutoScale);

    // --- Fitur Ciutkan / Tampilkan Pratinjau ---
    function togglePreview() {
      const previewSection = document.getElementById('preview-section');
      const icon = document.getElementById('toggle-preview-icon');
      
      isPreviewVisible = !isPreviewVisible;
      
      if (isPreviewVisible) {
          // Tampilkan: hilangkan hidden, kembalikan class flex-1 dan tinggi asal
          previewSection.classList.remove('hidden');
          setTimeout(() => {
            previewSection.classList.replace('opacity-0', 'opacity-100');
            icon.setAttribute('data-lucide', 'eye-off');
            lucide.createIcons();
            calculateAutoScale(); // Recalculate zoom
          }, 10);
      } else {
          // Ciutkan: jadikan hidden
          previewSection.classList.replace('opacity-100', 'opacity-0');
          setTimeout(() => {
            previewSection.classList.add('hidden');
            icon.setAttribute('data-lucide', 'eye');
            lucide.createIcons();
          }, 300);
      }
    }

    // --- Helper ---
    function val(id, fallback = '.........................') {
      const el = document.getElementById(id);
      return el && el.value.trim() !== '' ? el.value : fallback;
    }

    // --- Render Certificate ---
    function renderPreview() {
      const container = document.getElementById('cert-container');
      const theme = templates[currentTemplate];
      const isAr = currentLanguage === 'ar';
      const t = translations[currentLanguage];
      
      container.classList.remove('fade-enter-active');
      container.classList.add('fade-enter');
      
      setTimeout(() => {
        // SVG Flags
        const flagID = `<div class="shadow-sm border border-black/20 overflow-hidden" style="width: 30mm; height: 20mm;"><img src="https://lh3.googleusercontent.com/d/1B474IkUFpGbX_lLD924dl-tmEGw1dgt8" class="w-full h-full object-cover" crossorigin="anonymous" /></div>`;
        const flagSA = `<div class="shadow-sm border border-black/20 overflow-hidden" style="width: 30mm; height: 20mm;"><img src="https://lh3.googleusercontent.com/d/1X8HwnPQvRuFuFM1c2tNuTd6Q7OEkRfdl" class="w-full h-full object-cover" crossorigin="anonymous" /></div>`;

        // Logo
        const logoHtml = imgLogo ? `<img src="${imgLogo}" class="h-16 w-16 object-contain" />` : `<div class="w-16 h-16 border-2 border-dashed border-current opacity-30 flex items-center justify-center text-[8px]">LOGO</div>`;
        
        // TTD
        const ttdHtml = imgTtd ? `<img src="${imgTtd}" class="absolute -bottom-4 left-1/2 -translate-x-1/2 h-32 w-56 object-contain mix-blend-multiply pointer-events-none z-30" />` : '';

        // Patterns and Image Overlays
        const patternHtml = theme.pattern ? `<div class="pattern-overlay"></div>` : '';
        const bgImageHtml = theme.bgImage ? `<div class="absolute inset-0 z-0 ${theme.imageOpacity} pointer-events-none" style="background-image: url('${theme.bgImage}'); background-size: cover; background-position: center;"></div>` : '';

        // Tanggal Format
        const dateInputVal = document.getElementById('b_tanggal').value;
        const locVal = val('b_lokasi', isAr ? 'مكة المكرمة' : 'Makkah');
        const formattedDateFull = formatHijriMasehi(dateInputVal, locVal, isAr);

        // QR Code
        const linkDokumentasi = document.getElementById('b_link').value.trim();
        let qrDisplayHtml = `
          <div class="w-20 h-20 border-2 border-current p-1 opacity-50 flex items-center justify-center flex-col rounded">
            <i data-lucide="qr-code" class="w-10 h-10"></i>
            <span class="text-[6px] mt-1 font-sans uppercase font-bold text-center">${t.qrText}</span>
          </div>`;
          
        if (linkDokumentasi && linkDokumentasi.startsWith('http')) {
          const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(linkDokumentasi)}`;
          qrDisplayHtml = `
            <div class="w-20 h-20 bg-white border border-slate-300 p-1 flex items-center justify-center flex-col rounded shadow-sm">
              <img src="${qrUrl}" alt="QR Dokumentasi" class="w-full h-full object-contain" crossorigin="anonymous" />
            </div>
            <span class="text-[8px] mt-1 font-sans uppercase font-bold tracking-wider">${isAr ? 'توثيق' : 'Dokumentasi'}</span>`;
        }

        // Mapping Data Khusus Arab
        const valJenis = val('b_jenis', 'Badal Umroh');
        const displayJenis = isAr ? (jenisMapAr[valJenis] || valJenis) : valJenis;
        
        const valMiqot = val('b_miqot', 'Bir Ali (Zulhulaifah)');
        const displayMiqot = isAr ? (miqotMapAr[valMiqot] || valMiqot) : valMiqot;

        const html = `
          <div class="cert-inner ${theme.bgOut}" ${isAr ? 'dir="rtl"' : ''}>
            <div class="w-full h-full ${theme.bgInner} relative flex flex-col items-center justify-between p-4 md:p-5">
              
              ${patternHtml}
              ${bgImageHtml}
              
              <!-- Header Row -->
              <div class="w-full flex justify-between items-start relative z-20">
                <div class="w-16 h-16"></div> <!-- Spacer for balance -->
                <div class="${theme.textMain} cert-body-text opacity-80 text-xs font-bold uppercase tracking-widest text-center mt-2">
                  ${val('b_travel', t.lblTravel)}
                </div>
                <div class="w-16 h-16 flex justify-end">
                  ${logoHtml}
                </div>
              </div>

              <!-- Title Section with Flags -->
              <div class="flex justify-center items-center gap-6 md:gap-8 relative z-20 -mt-4 md:-mt-6 w-full" ${isAr ? 'dir="ltr"' : ''}>
                <div class="flex-shrink-0 pb-4">${flagID}</div>
                
                <div class="text-center flex-1 max-w-[500px]">
                  <h1 class="text-4xl md:text-5xl uppercase tracking-widest cert-title-text ${theme.title}">
                    ${t.certTitle}
                  </h1>
                  <h2 class="text-xl md:text-2xl mt-1 tracking-widest uppercase font-semibold cert-title-text ${theme.accent}">
                    ${displayJenis}
                  </h2>
                  <div class="w-48 h-1 ${theme.bgInner} mx-auto mt-2 rounded-full opacity-50 border-t border-current"></div>
                  <p class="mt-1 text-sm ${theme.textMain} cert-body-text opacity-80">${t.lblNomor}: ${val('b_nomor', 'BU-20260417-001')}</p>
                </div>
                
                <div class="flex-shrink-0 pb-4">${flagSA}</div>
              </div>

              <!-- Body Section -->
              <div class="text-center relative z-20 flex-1 flex flex-col justify-center w-full my-1">
                <p class="text-sm md:text-base ${theme.textMain} cert-body-text mb-1 italic">${t.certGivenTo}</p>
                <h3 class="text-5xl md:text-7xl cert-script-text ${theme.accent} my-1 leading-tight w-full px-2">
                  ${val('b_peserta', t.lblPeserta)}
                </h3>
                
                <p class="text-sm md:text-base ${theme.textMain} cert-body-text mt-2 max-w-4xl mx-auto leading-relaxed">
                  ${t.certDesc1} <strong class="cert-title-text">${displayJenis}</strong> 
                  ${t.certDesc2} <strong class="cert-title-text">${displayMiqot}</strong> 
                  ${t.certDesc3} <strong class="cert-title-text">${val('b_waktu', '....................')}</strong>${isAr ? '،' : ','}<br> 
                  ${t.certDesc4} <br>
                  <span class="text-lg font-bold mt-1 inline-block border-b border-current border-dashed pb-1 px-4 cert-title-text">${val('b_pelaksana', t.lblPelaksana)}</span>
                </p>
              </div>

              <!-- Hadith Section -->
              <div class="w-full max-w-4xl mx-auto relative z-20 border-y border-current py-2 opacity-80 ${theme.textMain}">
                <p class="cert-arabic-text text-2xl md:text-3xl leading-loose mb-0" dir="rtl">
                  حج عن أبيك واعتمر

                <p class="text-[10px] md:text-xs leading-relaxed px-4 cert-body-text" ${isAr ? 'dir="rtl"' : 'dir="ltr"'}>
                  ${t.hadithTranslation}
                </p>
              </div>

              <!-- Footer Section -->
              <div class="w-full flex justify-between items-end relative z-20 mt-2">
                
                <!-- QR Dokumentasi -->
                <div class="flex flex-col items-center justify-end pb-1 ${theme.textMain} cert-body-text">
                  ${qrDisplayHtml}

                <!-- Signature -->
                <div class="text-center w-[300px] ${theme.textMain} cert-body-text">
                  <p class="text-[10px] md:text-xs mb-1 leading-relaxed px-2" ${isAr ? 'dir="rtl"' : 'dir="ltr"'}>${formattedDateFull}</p>
                  <p class="text-xs font-bold uppercase mb-12">${val('b_travel', t.lblTravel)}</p>
                  
                  <div class="relative w-full flex flex-col items-center">
                    ${ttdHtml}
                    <p class="font-bold border-b border-current inline-block pb-0.5 px-4 relative z-20 cert-title-text">${val('b_penandatangan', t.lblPenandatangan)}</p>

                  <p class="text-[10px] mt-1 uppercase tracking-wider">${val('b_jabatan', t.lblJabatan)}</p>
                </div>

              </div>

            </div>

        container.innerHTML = html;
        container.className = `certificate-container ${theme.bgOut}`;
        lucide.createIcons();
        
        requestAnimationFrame(() => {
          container.classList.add('fade-enter-active');
        });

      }, 50);
    }

    // Run
    window.onload = init;

  </script>
