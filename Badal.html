    :root {
      --primary: #047857; /* Emerald 600 */
      --primary-dark: #064e3b; /* Emerald 900 */
      --primary-bg: #ecfdf5; /* Emerald 50 */
      --accent: #d97706; /* Amber 600 */
    }

    body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
    
    /* Document Fonts */
    .font-serif { font-family: 'Playfair Display', serif; }
    .font-arabic { font-family: 'Amiri', serif; }
    .font-script { font-family: 'Great Vibes', cursive; }

    /* Custom Scrollbars */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--primary); }

    /* Certificate Layout (A4 Landscape) */
    .cert-wrapper { perspective: 1000px; }
    
    .certificate-container {
      width: 297mm;
      height: 210mm;
      min-width: 297mm;
      min-height: 210mm;
      margin: 0 auto;
      background: white;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      position: relative;
      box-sizing: border-box;
      transition: all 0.4s ease;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0; /* Margin kertas putih dihilangkan agar Full A4 */
    }

    .cert-inner {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 10;
      padding: 6mm; /* Jarak antara tepian kertas full dan bingkai dalam */
      display: flex;
      flex-direction: column;
      text-align: center;
      background-size: cover;
      background-position: center;
    }

    /* Print Configuration */
    @media print {
      @page { size: A4 landscape; margin: 0; }
      body { background: white; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body * { visibility: hidden; }
      #preview-section, #preview-section * { visibility: visible; }
      #preview-section { position: absolute; left: 0; top: 0; width: 100%; height: 100%; margin: 0; padding: 0; background: white; overflow: hidden; display: block; }
      .certificate-container { box-shadow: none !important; width: 297mm; height: 210mm; margin: 0; transform: scale(1) !important; page-break-after: avoid; }
      .cert-wrapper { display: block; overflow: visible; padding: 0; }
      ::-webkit-scrollbar { display: none; }
    }

    /* Islamic Pattern Backgrounds */
    .pattern-overlay {
      position: absolute;
      inset: 0;
      opacity: 0.05;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* Fade Transition */
    .fade-enter { opacity: 0; transform: scale(0.98); }
    .fade-enter-active { opacity: 1; transform: scale(1); transition: opacity 400ms, transform 400ms; }
    
    .thumb-active { border-color: var(--primary) !important; ring: 2px; ring-color: var(--primary); transform: scale(1.05); }

    /* Main app fade in */
    #main-app { opacity: 0; transition: opacity 0.8s ease-in-out; }
    #main-app.loaded { opacity: 1; }

    // --- Core Initialization ---
    function init() {

          setTimeout(() => {

          }, 700);
        }
      }, 1800);

      renderThemeSelector();
      
      const dateInput = document.getElementById('b_tanggal');
      const numInput = document.getElementById('b_nomor');
      const today = new Date();
      
      if (!dateInput.value) {
        // Set to YYYY-MM-DD for date input
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        dateInput.value = `${yyyy}-${mm}-${dd}`;
      }
      
      if (!numInput.value) {
        const yyyymmdd = today.toISOString().slice(0,10).replace(/-/g, "");
        const rnd = Math.floor(Math.random() * 900) + 100;
        numInput.value = `BU-${yyyymmdd}-${rnd}`;

    // --- Logic Login & Intercept Print ---
    // 1. Intercept Ctrl+P
    document.addEventListener('keydown', function(event) {
        if ((event.ctrlKey || event.metaKey) && event.key === 'p') {
            event.preventDefault(); // cegah print default
            attemptPrint(); // jalankan fungsi kita
        }
    });

    // 2. Hash Password di Client (SHA-256)
    async function hashPassword(message) {
        const msgBuffer = new TextEncoder().encode(message);                    
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        return hashHex;
    }

    // 3. Logic Show/Hide Modal
    function showLoginModal() {
        const modal = document.getElementById('loginModal');
        const view = document.getElementById('loginView');
        modal.classList.remove('hidden');
        setTimeout(() => { view.classList.remove('scale-95'); view.classList.add('scale-100'); }, 10);
    }

    function closeLoginModal() {
        const modal = document.getElementById('loginModal');
        const view = document.getElementById('loginView');
        view.classList.remove('scale-100'); view.classList.add('scale-95');
        setTimeout(() => { modal.classList.add('hidden'); }, 300);
    }

    // 4. Periksa apakah boleh print
    function attemptPrint() {
        const isAuth = sessionStorage.getItem('is_auth_print') === 'true';
        if (isAuth) {
            window.print(); // Jika sudah login di sesi ini, langsung print
        } else {
            showLoginModal(); // Jika belum, tampilkan modal login
        }
    }

    // 5. Handle Proses Login (Hit ke Google Apps Script API)
    async function handleLogin() {
        const pwdInput = document.getElementById('password').value;
        if (!pwdInput) return alert("Silakan masukkan sandi akses!");

        const btn = document.getElementById('btnLogin');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Memverifikasi...</span>';
        btn.disabled = true;

        try {
            const hashedPwd = await hashPassword(pwdInput);
            
            // Decode API URL yang disembunyikan
            let apiUrl = null;
            if (API_ENCODED !== 'YOUR_BASE64_ENCODED_API_URL_HERE') {
                if (API_ENCODED.startsWith('http')) {
                    apiUrl = API_ENCODED;
                } else {
                    try {
                        let base64Str = API_ENCODED;
                        // Tambahkan padding '=' untuk menghindari InvalidCharacterError pada atob
                        while (base64Str.length % 4 !== 0) {
                            base64Str += '=';
                        }
                        apiUrl = atob(base64Str);
                    } catch (e) {
                        console.warn("Peringatan: URL API gagal di-decode, menggunakan URL secara langsung.");
                        apiUrl = API_ENCODED;
                    }
                }
            }
            
            if(!apiUrl || !apiUrl.startsWith('http')) {
                alert("API Endpoint belum disetting dengan benar di source code.");
                throw new Error("Missing or Invalid API URL");
            }

            const response = await fetch(apiUrl, {
                method: 'POST',
                // PENTING: Gunakan text/plain untuk menghindari error preflight CORS di Google Script
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ hash: hashedPwd })
            });

            const result = await response.json();

            if (result.status === 'success') {
                sessionStorage.setItem('is_auth_print', 'true');
                closeLoginModal();
                
                // Delay sejenak biar animasi modal tertutup rapi sebelum kotak dialog print muncul
                setTimeout(() => {
                    window.print();
                }, 400);

            } else {
                alert("Sandi akses yang Anda masukkan SALAH!");
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }

        } catch (error) {
            console.error("Gagal verifikasi login:", error);
            alert("Terjadi kesalahan sistem/jaringan saat memverifikasi sandi. Silakan periksa koneksi Anda.");
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    // Enter key pada field password untuk submit
    document.getElementById('password').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') handleLogin();
    });


    // --- Helper Format Date (Masehi & Hijriah) ---
    function formatHijriMasehi(dateStr, location) {
      if(!dateStr) return '';
      try {
        const d = new Date(dateStr);
        if (isNaN(d)) return `${location}, ${dateStr}`;

        const optionsM = { day: 'numeric', month: 'long', year: 'numeric' };
        const masehi = d.toLocaleDateString('id-ID', optionsM) + ' M';
        
        let hijriah = '';
        try {
          const optionsH = { day: 'numeric', month: 'long', year: 'numeric', calendar: 'islamic-umalqura' };
          let hStr = new Intl.DateTimeFormat('id-ID-u-ca-islamic-umalqura', optionsH).format(d);
          hijriah = hStr.replace(/ M| H| AH/gi, '').trim() + ' H';
        } catch(e) {
          hijriah = '';
        }

        return hijriah ? `${location}, ${masehi}, bertepatan dengan ${hijriah}` : `${location}, ${masehi}`;
      } catch(e) {
        return `${location}, ${dateStr}`;
      }
    }

    function renderThemeSelector() {

        btn.style.background = theme.thumb;
        btn.title = theme.name;
        btn.onclick = () => {

      });
    }

    function handleImageUpload(e, type) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const base64 = event.target.result;
          if (type === 'logo') { imgLogo = base64; }
          if (type === 'ttd') { imgTtd = base64; }
          
          try {
            localStorage.setItem(`bu_${type}`, base64);
          } catch(err) { console.warn("Image too large for local storage"); }
          
          updateImageUI();
          queueAutoSave();
        };
        reader.readAsDataURL(file);
      }
    }

    function saveData() {
      const inputs = document.querySelectorAll('.input-field');
      const data = { template: currentTemplate, fields: {} };
      inputs.forEach(input => { data.fields[input.id] = input.value; });
      localStorage.setItem('bu_data', JSON.stringify(data));
    }

    function loadSavedData() {
      imgLogo = localStorage.getItem('bu_logo');
      imgTtd = localStorage.getItem('bu_ttd');
      updateImageUI();

      const savedData = localStorage.getItem('bu_data');
      if (savedData) {
        try {
          const data = JSON.parse(savedData);
          if (data.template !== undefined) { currentTemplate = data.template; renderThemeSelector(); }
          if (data.fields) {
            Object.keys(data.fields).forEach(id => {
              const el = document.getElementById(id);
              if (el) el.value = data.fields[id];
            });
          }
        } catch(e) { console.error("Error loading data", e); }
      }
    }
