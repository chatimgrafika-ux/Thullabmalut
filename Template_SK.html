<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Letter Generator</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
    
    :root {
      /* Default Theme (Teal) */
      --primary: #1db1a2;
      --primary-dark: #168e82;
      --primary-bg: #f0fbf9;
      --accent: #eab308;
    }

    body { font-family: 'Inter', sans-serif; }
    
    /* Document Font */
    .font-doc {
      font-family: 'Times New Roman', Times, serif;
      line-height: 1.5;
      color: #000;
    }

    /* Custom Scrollbars */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--primary); }

    /* A4 Paper Configuration */
    .paper-wrapper {
      perspective: 1000px;
    }
    
    .paper {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      background: white;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      position: relative;
      box-sizing: border-box;
      padding: 20mm; /* Standard margin */
      transition: all 0.5s ease;
      overflow: hidden;
    }

    /* Content z-index to stay above watermark */
    .paper-content {
      position: relative;
      z-index: 10;
    }

    /* Print Configuration */
    @media print {
      @page {
        size: A4;
        margin: 0;
      }
      body {
        background: white;
      }
      body * {
        visibility: hidden;
      }
      #preview-section, #preview-section * {
        visibility: visible;
      }
      #preview-section {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        margin: 0;
        padding: 0;
        background: white;
      }
      .paper {
        box-shadow: none !important;
        width: 210mm;
        height: 297mm;
        margin: 0;
        padding: 20mm;
        page-break-after: avoid;
      }
      /* Hide scrollbars during print */
      ::-webkit-scrollbar {
        display: none;
      }
    }

    /* Transitions */
    .fade-enter {
      opacity: 0;
      transform: translateY(10px);
    }
    .fade-enter-active {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 300ms, transform 300ms;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden h-screen flex flex-col md:flex-row">

  <!-- ================= SPLASH SCREEN ================= -->
  <div id="splash-screen" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center p-6 text-center transition-opacity duration-500">
    <div class="w-28 mb-6 animate-bounce">
      <img src="https://lh3.googleusercontent.com/d/1T_gjbh4D8xTkoE3zVF0WoQl5xdhb3nCJ" alt="Logo" class="w-full h-full object-contain" />
    </div>
    <h3 class="text-center text-slate-700 font-bold">
      <span class="block text-xl mb-1 font-black" dir="rtl">نظام الدخول الموحد</span>
      <span class="block text-sm font-normal text-slate-500 uppercase tracking-widest">Memuat Workspace...</span>
    </h3>
  </div>

  <!-- ================= LEFT: CONTROL PANEL (FORM) ================= -->
  <div class="w-full md:w-[450px] lg:w-[500px] h-full flex flex-col bg-white border-r border-slate-200 shadow-2xl z-20 flex-shrink-0">
    
    <!-- HEADER -->
    <header class="sticky top-0 z-30 bg-white/95 backdrop-blur-sm p-5 border-b border-slate-100 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <img src="https://lh3.googleusercontent.com/d/1T_gjbh4D8xTkoE3zVF0WoQl5xdhb3nCJ" class="w-10 h-10 object-contain" alt="Logo" />
        <div>
          <h1 class="text-sm font-black text-slate-800 tracking-tight uppercase">Smart Letter Gen</h1>
          <p class="text-[10px] text-slate-500 font-medium">Official Document Builder</p>
        </div>
      </div>
      <div class="flex gap-2">
        <button onclick="resetData()" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="Reset Form">
          <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
        </button>
        <button onclick="window.print()" class="flex items-center gap-2 bg-[var(--primary)] hover:bg-[var(--primary-dark)] text-white px-3 py-2 rounded-lg text-xs font-bold transition-colors shadow-md">
          <i data-lucide="printer" class="w-4 h-4"></i> CETAK PDF
        </button>
      </div>
    </header>

    <!-- FORM AREA -->
    <div class="flex-1 overflow-y-auto p-5 space-y-6 custom-scrollbar pb-24" id="form-container">
      
      <!-- Theme Selection -->
      <section class="bg-slate-50 p-4 rounded-2xl border border-slate-200">
        <h2 class="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-3 flex items-center gap-2">
          <i data-lucide="palette" class="w-3 h-3 text-[var(--primary)]"></i> Tema UI
        </h2>
        <div id="theme-container" class="flex flex-wrap gap-2">
          <!-- Themes injected here -->
        </div>
      </section>

      <!-- Letter Type Selector -->
      <section>
        <label class="block text-[11px] font-black text-slate-500 uppercase tracking-widest mb-2">Jenis Surat</label>
        <div class="relative">
          <select id="letter-type" onchange="handleTypeChange()" class="w-full appearance-none bg-white border-2 border-slate-200 text-slate-800 text-sm font-semibold rounded-xl p-3.5 pr-10 focus:outline-none focus:border-[var(--primary)] focus:ring-4 focus:ring-[var(--primary-bg)] transition-all cursor-pointer shadow-sm">
            <option value="kuasa">Surat Kuasa (Umum)</option>
            <option value="izin">Surat Izin Orang Tua (Studi/Imigrasi)</option>
            <option value="skck">Surat Keterangan Kelakuan Baik (Sekolah)</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
            <i data-lucide="chevron-down" class="w-4 h-4"></i>
          </div>
        </div>
      </section>

      <!-- Global Settings (Date, Location, Number) -->
      <section class="bg-slate-50 p-4 rounded-2xl border border-slate-200">
        <h2 class="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-3">Atribut Surat</h2>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-[10px] font-semibold text-slate-400 mb-1">Lokasi Pembuatan</label>
            <input type="text" id="g-lokasi" value="Jakarta" class="input-field w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm focus:border-[var(--primary)] focus:ring-2 focus:ring-[var(--primary-bg)] outline-none shadow-sm transition-all" oninput="queueAutoSave()" />
          </div>
          <div>
            <label class="block text-[10px] font-semibold text-slate-400 mb-1">Tanggal</label>
            <input type="text" id="g-tanggal" class="input-field w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm focus:border-[var(--primary)] focus:ring-2 focus:ring-[var(--primary-bg)] outline-none shadow-sm transition-all" oninput="queueAutoSave()" />
          </div>
          <div class="col-span-2">
            <label class="block text-[10px] font-semibold text-slate-400 mb-1">Nomor Surat (Optional)</label>
            <input type="text" id="g-nomor" placeholder="Otomatis / Kosongkan jika tidak perlu" class="input-field w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm focus:border-[var(--primary)] focus:ring-2 focus:ring-[var(--primary-bg)] outline-none shadow-sm transition-all font-mono text-xs" oninput="queueAutoSave()" />
          </div>
        </div>
      </section>

      <!-- Kop Surat Configuration -->
      <section class="bg-slate-50 p-4 rounded-2xl border border-slate-200" id="section-kop">
        <h2 class="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-3 flex items-center justify-between">
          <span>Kop Surat (Header)</span>
          <label class="cursor-pointer bg-white border border-slate-200 hover:border-[var(--primary)] text-slate-500 hover:text-[var(--primary)] px-2 py-1 rounded text-[9px] flex items-center gap-1 transition-colors">
            <i data-lucide="upload" class="w-3 h-3"></i> Logo
            <input type="file" accept="image/*" class="hidden" onchange="handleLogoUpload(event)">
          </label>
        </h2>
        <div class="space-y-3">
          <input type="text" id="k-instansi" placeholder="Nama Instansi / Perusahaan (Opsional)" class="input-field w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm focus:border-[var(--primary)] outline-none shadow-sm font-bold" oninput="queueAutoSave()" />
          <input type="text" id="k-alamat" placeholder="Alamat Instansi / Kontak (Opsional)" class="input-field w-full p-2.5 bg-white border border-slate-200 rounded-lg text-xs focus:border-[var(--primary)] outline-none shadow-sm" oninput="queueAutoSave()" />
        </div>
      </section>

      <!-- DYNAMIC FORM FIELDS -->
      <section>
        <h2 class="text-[11px] font-black text-[var(--primary-dark)] uppercase tracking-widest mb-4 pb-2 border-b-2 border-[var(--primary-bg)]">Data Spesifik Surat</h2>
        <div id="dynamic-fields" class="space-y-4">
          <!-- Fields rendered via JS -->
        </div>
      </section>

    </div>
  </div>

  <!-- ================= RIGHT: PREVIEW PANEL ================= -->
  <div class="flex-1 bg-slate-200/80 overflow-y-auto p-4 md:p-10 flex justify-center items-start custom-scrollbar relative" id="preview-section">
    
    <!-- A4 Paper Container -->
    <div class="paper-wrapper w-full max-w-[210mm] overflow-x-auto custom-scrollbar flex justify-center pb-10">
      <div class="paper" id="paper-doc">
        
        <!-- Content -->
        <div class="paper-content font-doc flex flex-col h-full" id="paper-content">
          <!-- Template injected here -->
        </div>

      </div>
    </div>

  </div>

  <!-- ================= SCRIPTS ================= -->
  <script>
    // --- Initialize Icons ---
    lucide.createIcons();

    // --- State Management ---
    let currentLogo = null;
    let autoSaveTimeout = null;
    let globalFormState = {}; // Menyimpan semua data field antar jenis surat

    // --- 20 Color Themes (Imported from F4 CV App) ---
    const themes = [
      { name: 'Teal', primary: '#1db1a2', dark: '#168e82', bg: '#f0fbf9', accent: '#eab308' },
      { name: 'Navy', primary: '#1e3a8a', dark: '#1e3a8a', bg: '#eff6ff', accent: '#fbbf24' },
      { name: 'Burgundy', primary: '#881337', dark: '#4c0519', bg: '#fff1f2', accent: '#f87171' },
      { name: 'Emerald', primary: '#059669', dark: '#047857', bg: '#ecfdf5', accent: '#10b981' },
      { name: 'Royal', primary: '#2563eb', dark: '#1d4ed8', bg: '#eff6ff', accent: '#f97316' },
      { name: 'Purple', primary: '#7c3aed', dark: '#5b21b6', bg: '#f5f3ff', accent: '#facc15' },
      { name: 'Charcoal', primary: '#374151', dark: '#1f2937', bg: '#f3f4f6', accent: '#34d399' },
      { name: 'Crimson', primary: '#dc2626', dark: '#b91c1c', bg: '#fef2f2', accent: '#1e3a8a' },
      { name: 'Slate', primary: '#475569', dark: '#334155', bg: '#f8fafc', accent: '#fb7185' },
      { name: 'Indigo', primary: '#4f46e5', dark: '#3730a3', bg: '#eef2ff', accent: '#fb7185' }
    ];

    // --- Data Definitions for Letter Types ---
    const formDefinitions = {
      'kuasa': [
        { group: 'Pihak Pertama (Pemberi Kuasa)' },
        { id: 'k_nama1', label: 'Nama Lengkap', type: 'text', placeholder: 'Budi Santoso' },
        { id: 'k_nik1', label: 'Nomor Induk Kependudukan (NIK)', type: 'text', placeholder: '3171234567890001' },
        { id: 'k_alamat1', label: 'Alamat Lengkap', type: 'textarea', placeholder: 'Jl. Merdeka No. 1, Jakarta Selatan' },
        { group: 'Pihak Kedua (Penerima Kuasa)' },
        { id: 'k_nama2', label: 'Nama Lengkap', type: 'text', placeholder: 'Andi Setiawan' },
        { id: 'k_nik2', label: 'Nomor Induk Kependudukan (NIK)', type: 'text', placeholder: '3179876543210002' },
        { id: 'k_alamat2', label: 'Alamat Lengkap', type: 'textarea', placeholder: 'Jl. Sudirman No. 10, Jakarta Pusat' },
        { group: 'Detail Kuasa' },
        { id: 'k_keperluan', label: 'Tujuan Pemberian Kuasa', type: 'datalist', options: ['Pengambilan Surat Keterangan Catatan Kepolisian (SKCK)', 'Pengambilan Ijazah / Transkrip Nilai', 'Legalisir Dokumen Pendidikan', 'Pengurusan Administrasi Pendidikan (Daftar Ulang, dll)', 'Pengambilan BPKB / STNK Kendaraan'], placeholder: 'Pilih opsi atau ketik sendiri...' }
      ],
      'izin': [
        { group: 'Instansi Tujuan' },
        { id: 'i_instansi', label: 'Ditujukan Kepada (Instansi)', type: 'text', placeholder: 'Kepala Kantor Imigrasi' },
        { group: 'Data Orang Tua / Wali' },
        { id: 'i_ortu_nama', label: 'Nama Lengkap', type: 'text', placeholder: 'Ahmad Fauzi' },
        { id: 'i_ortu_pekerjaan', label: 'Pekerjaan', type: 'text', placeholder: 'Wiraswasta' },
        { id: 'i_ortu_alamat', label: 'Alamat Lengkap', type: 'textarea', placeholder: 'Jl. Ahmad Yani No. 5, Medan' },
        { group: 'Data Anak' },
        { id: 'i_anak_nama', label: 'Nama Anak', type: 'text', placeholder: 'Muhammad Fatih' },
        { id: 'i_anak_paspor', label: 'Nomor Paspor / NIK', type: 'text', placeholder: 'C1234567' },
        { group: 'Detail Keperluan Izin' },
        { id: 'i_keperluan', label: 'Keperluan', type: 'text', placeholder: 'Penerbitan Paspor RI' },
        { id: 'i_tujuan', label: 'Tujuan (Negara/Pendidikan)', type: 'datalist', options: ['Melanjutkan Pendidikan ke Universitas Islam Madinah (UIM)', 'Melanjutkan Pendidikan ke Universitas Umm Al-Qura (UQU)', 'Melanjutkan Pendidikan ke Arab Saudi'], placeholder: 'Pilih kampus/negara atau ketik sendiri...' }
      ],
      'skck': [
        { group: 'Data Siswa / Santri' },
        { id: 's_nama', label: 'Nama Lengkap', type: 'text', placeholder: 'Aisyah Putri' },
        { id: 's_nis', label: 'NIS / NISN', type: 'text', placeholder: '19283746' },
        { id: 's_ttl', label: 'Tempat, Tanggal Lahir', type: 'text', placeholder: 'Bandung, 12 Agustus 2005' },
        { id: 's_alamat', label: 'Alamat Siswa', type: 'textarea', placeholder: 'Jl. Kopo No. 99, Bandung' },
        { group: 'Keterangan' },
        { id: 's_kelakuan', label: 'Keterangan Akhlak', type: 'textarea', placeholder: 'Berkelakuan sangat baik, disiplin, dan tidak pernah melanggar tata tertib sekolah.' }
      ]
    };

    // --- Core Functions ---

    function init() {
      // Splash screen logic
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        if(splash) {
          splash.style.opacity = '0';
          setTimeout(() => {
            splash.classList.add('hidden');
          }, 500);
        }
      }, 1500);

      renderThemes();
      
      // Generate default date (Format Indonesia)
      const dateInput = document.getElementById('g-tanggal');
      if (!dateInput.value) {
        const today = new Date();
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        dateInput.value = today.toLocaleDateString('id-ID', options);
      }

      loadSavedData(); // Load Local Storage first
      handleTypeChange(false); // Render initial UI
    }

    // --- Theming ---
    function renderThemes() {
      const container = document.getElementById('theme-container');
      themes.forEach((theme, idx) => {
        const btn = document.createElement('button');
        btn.className = "w-6 h-6 rounded-full border-2 border-white outline outline-1 outline-slate-200 hover:scale-110 transition-transform shadow-sm relative overflow-hidden";
        btn.style.backgroundColor = theme.primary;
        btn.title = theme.name;
        btn.onclick = () => applyTheme(idx);
        container.appendChild(btn);
      });
    }

    function applyTheme(idx) {
      const theme = themes[idx];
      const root = document.documentElement;
      root.style.setProperty('--primary', theme.primary);
      root.style.setProperty('--primary-dark', theme.dark);
      root.style.setProperty('--primary-bg', theme.bg);
      root.style.setProperty('--accent', theme.accent);
      localStorage.setItem('slg_theme', idx);
    }

    // --- Logo Upload ---
    function handleLogoUpload(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          currentLogo = event.target.result;
          try {
            localStorage.setItem('slg_logo', currentLogo);
          } catch(err) { console.warn("Logo too large for local storage"); }
          renderPreview();
        };
        reader.readAsDataURL(file);
      }
    }

    // --- Dynamic Form Generation ---
    function handleTypeChange(triggerSave = true) {
      const type = document.getElementById('letter-type').value;
      const container = document.getElementById('dynamic-fields');
      const fields = formDefinitions[type];
      
      // Sembunyikan atau tampilkan form Kop Surat berdasarkan jenis surat
      const sectionKop = document.getElementById('section-kop');
      if (type === 'skck') {
        sectionKop.style.display = 'block';
      } else {
        sectionKop.style.display = 'none';
      }

      container.innerHTML = ''; // Clear

      fields.forEach(field => {
        if (field.group) {
          container.innerHTML += `<h3 class="text-[10px] font-bold text-slate-400 bg-slate-50 p-2 rounded mt-4 mb-2 uppercase tracking-wider">${field.group}</h3>`;
          return;
        }

        let inputHtml = '';
        if (field.type === 'textarea') {
          inputHtml = `<textarea id="${field.id}" placeholder="${field.placeholder}" class="input-field w-full p-3 bg-white border border-slate-200 rounded-xl text-sm focus:border-[var(--primary)] focus:ring-2 focus:ring-[var(--primary-bg)] outline-none shadow-sm transition-all" rows="2" oninput="queueAutoSave()"></textarea>`;
        } else if (field.type === 'datalist') {
          const listId = field.id + '-list';
          const optionsHtml = field.options.map(opt => `<option value="${opt}"></option>`).join('');
          inputHtml = `
            <input type="text" id="${field.id}" list="${listId}" placeholder="${field.placeholder}" class="input-field w-full p-3 bg-white border border-slate-200 rounded-xl text-sm focus:border-[var(--primary)] focus:ring-2 focus:ring-[var(--primary-bg)] outline-none shadow-sm transition-all" oninput="queueAutoSave()" autocomplete="off" />
            <datalist id="${listId}">${optionsHtml}</datalist>
          `;
        } else {
          inputHtml = `<input type="${field.type}" id="${field.id}" placeholder="${field.placeholder}" class="input-field w-full p-3 bg-white border border-slate-200 rounded-xl text-sm focus:border-[var(--primary)] focus:ring-2 focus:ring-[var(--primary-bg)] outline-none shadow-sm transition-all" oninput="queueAutoSave()" />`;
        }

        container.innerHTML += `
          <div>
            <label class="block text-[11px] font-semibold text-slate-600 mb-1.5">${field.label}</label>
            ${inputHtml}
          </div>
        `;
      });

      // Restore specific fields from local storage if changing back
      restoreFieldsFromState();
      
      if(triggerSave) queueAutoSave();
      renderPreview();
    }

    // --- Local Storage (Auto Save) ---
    function queueAutoSave() {
      clearTimeout(autoSaveTimeout);
      renderPreview(); // Update UI immediately
      autoSaveTimeout = setTimeout(saveData, 500); // Save after 500ms inactivity
    }

    function saveData() {
      // 1. Kumpulkan nilai dari input yang sedang aktif ke state global
      const inputs = document.querySelectorAll('#dynamic-fields .input-field');
      inputs.forEach(input => {
        globalFormState[input.id] = input.value;
      });

      // 2. Simpan keseluruhan state dan data global ke Local Storage
      const data = {
        type: document.getElementById('letter-type').value,
        global: {
          lokasi: document.getElementById('g-lokasi').value,
          tanggal: document.getElementById('g-tanggal').value,
          nomor: document.getElementById('g-nomor').value,
          k_instansi: document.getElementById('k-instansi').value,
          k_alamat: document.getElementById('k-alamat').value
        },
        fields: globalFormState
      };

      localStorage.setItem('slg_data', JSON.stringify(data));
    }

    function loadSavedData() {
      const savedTheme = localStorage.getItem('slg_theme');
      if (savedTheme !== null && themes[savedTheme]) applyTheme(parseInt(savedTheme));

      const savedLogo = localStorage.getItem('slg_logo');
      if (savedLogo) currentLogo = savedLogo;

      const savedData = localStorage.getItem('slg_data');
      if (savedData) {
        try {
          const data = JSON.parse(savedData);
          
          if(data.type) document.getElementById('letter-type').value = data.type;
          
          if(data.global) {
            if(data.global.lokasi) document.getElementById('g-lokasi').value = data.global.lokasi;
            if(data.global.tanggal) document.getElementById('g-tanggal').value = data.global.tanggal;
            if(data.global.nomor) document.getElementById('g-nomor').value = data.global.nomor;
            if(data.global.k_instansi) document.getElementById('k-instansi').value = data.global.k_instansi;
            if(data.global.k_alamat) document.getElementById('k-alamat').value = data.global.k_alamat;
          }
          
          // Memuat seluruh form fields state (untuk semua jenis surat)
          globalFormState = data.fields || {};
        } catch(e) { console.error("Error loading data", e); }
      }
    }

    function restoreFieldsFromState() {
      // Mengisi form input yang sedang dimuat dari global state
      Object.keys(globalFormState).forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = globalFormState[id];
      });
    }

    function resetData() {
      if(confirm("Apakah Anda yakin ingin mereset semua data?")) {
        localStorage.removeItem('slg_data');
        localStorage.removeItem('slg_logo');
        currentLogo = null;
        globalFormState = {}; // Reset state
        document.querySelectorAll('input, textarea').forEach(el => el.value = '');
        init(); // Re-initialize
      }
    }

    // --- Helper to get values safely ---
    function val(id, fallback = '.........................') {
      const el = document.getElementById(id);
      return el && el.value.trim() !== '' ? el.value : fallback;
    }

    // --- Render Letter Template ---
    function renderPreview() {
      const type = document.getElementById('letter-type').value;
      const contentDiv = document.getElementById('paper-content');
      
      // Animation class
      contentDiv.classList.remove('fade-enter-active');
      contentDiv.classList.add('fade-enter');
      
      setTimeout(() => {
        // Global variables
        const lokasi = val('g-lokasi', 'Jakarta');
        const tanggal = val('g-tanggal', '17 April 2026');
        const nomor = document.getElementById('g-nomor').value.trim();
        const kInstansi = document.getElementById('k-instansi').value.trim();
        const kAlamat = document.getElementById('k-alamat').value.trim();

        // 1. KOP SURAT GENERATOR
        let kopHtml = '';
        if (type === 'skck') {
          // Kop hanya dirender untuk surat kelakuan baik (SKCK)

                </div>
              </div>
            </div>

            </table>

              Berdasarkan catatan dan pengamatan kami selama yang bersangkutan menjadi siswa/santri di instansi kami, nama tersebut di atas <strong>${val('s_kelakuan')}</strong>.

            <p class="text-justify mb-10 leading-relaxed">

                <p class="font-bold underline">.....................................................</p>
                <p class="text-sm">NIP / Yayasan.</p>
              </div>
            </div>

        }

        // Apply HTML
        contentDiv.innerHTML = bodyHtml;
        
        // Trigger enter animation
        requestAnimationFrame(() => {
          contentDiv.classList.add('fade-enter-active');
        });

      }, 50); // slight delay to allow CSS reset
    }

    // Run on load
    window.onload = init;

  </script>
</body>
